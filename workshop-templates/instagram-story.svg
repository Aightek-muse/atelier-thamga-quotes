<?xml version="1.0" encoding="UTF-8"?>
<!-- Atelier Thamga - Workshop Instagram Story Template -->
<!-- Size: 1080x1920px (9:16) -->
<!-- Open in Illustrator to edit -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&amp;display=swap');
      .title { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-weight:700; fill:#1E3C72; }
      .subtitle { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-weight:600; fill:#BA5536; }
      .body { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-weight:400; fill:#2C2C2C; }
      .body-light { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-weight:400; fill:#787878; }
      .white { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; fill:#FFFFFF; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="#FCF8F0"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="#1E3C72"/>

  <!-- Safe area indicator (Instagram UI covers top/bottom) -->
  <rect x="0" y="0" width="1080" height="200" fill="#1E3C72"/>

  <!-- Logo (top center) -->
  <rect x="420" y="30" width="240" height="100" rx="10" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="540" y="72" text-anchor="middle" class="white" font-size="14">LOGO HERE</text>
  <text x="540" y="92" text-anchor="middle" class="white" font-size="14">Replace with Atelier Thamga</text>
  <text x="540" y="112" text-anchor="middle" class="white" font-size="14">or ZS Photography logo</text>

  <!-- Workshop badge -->
  <rect x="340" y="230" width="400" height="80" rx="40" fill="#BA5536"/>
  <text x="540" y="280" text-anchor="middle" class="white" font-size="32" font-weight="700">WORKSHOP</text>

  <!-- Title -->
  <text x="540" y="390" text-anchor="middle" class="white" font-size="72" font-weight="700">Blok Baskı</text>
  <text x="540" y="475" text-anchor="middle" class="white" font-size="72" font-weight="700">Atölyesi</text>

  <!-- Subtitle -->
  <text x="540" y="530" text-anchor="middle" class="white" font-size="26" font-weight="300" opacity="0.85">Anadolu'nun kadim motiflerini</text>
  <text x="540" y="562" text-anchor="middle" class="white" font-size="26" font-weight="300" opacity="0.85">ahşap kalıplarla kumaşa aktarın</text>

  <!-- Image placeholder -->
  <rect x="60" y="620" width="960" height="540" rx="20" fill="#E8E0D4"/>
  <text x="540" y="870" text-anchor="middle" class="body-light" font-size="22">[ WORKSHOP GÖRSELİ ]</text>
  <text x="540" y="900" text-anchor="middle" class="body-light" font-size="16">960 × 540px</text>
  <rect x="60" y="620" width="960" height="540" rx="20" fill="none" stroke="#BA5536" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Info cards -->
  <!-- Date -->
  <rect x="60" y="1200" width="300" height="120" rx="16" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="1"/>
  <text x="210" y="1248" text-anchor="middle" class="subtitle" font-size="20">📅 TARİH</text>
  <text x="210" y="1295" text-anchor="middle" class="title" font-size="30" font-weight="700">26 Nisan</text>

  <!-- Time -->
  <rect x="390" y="1200" width="300" height="120" rx="16" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="1"/>
  <text x="540" y="1248" text-anchor="middle" class="subtitle" font-size="20">⏰ SAAT</text>
  <text x="540" y="1295" text-anchor="middle" class="title" font-size="30" font-weight="700">14:00 - 17:00</text>

  <!-- Location -->
  <rect x="720" y="1200" width="300" height="120" rx="16" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="1"/>
  <text x="870" y="1248" text-anchor="middle" class="subtitle" font-size="20">📍 YER</text>
  <text x="870" y="1295" text-anchor="middle" class="title" font-size="30" font-weight="700">Atelier Thamga</text>

  <!-- What you'll learn -->
  <text x="60" y="1380" class="title" font-size="28" font-weight="700">Bu Atölyede:</text>
  <line x1="60" y1="1388" x2="140" y2="1388" stroke="#BA5536" stroke-width="3"/>

  <text x="60" y="1425" class="body" font-size="22">✦  Ahşap kalıp oyma temelleri</text>
  <text x="60" y="1460" class="body" font-size="22">✦  Doğal boya hazırlama</text>
  <text x="60" y="1495" class="body" font-size="22">✦  Selçuklu motiflerini kumaşa aktarma</text>
  <text x="60" y="1530" class="body" font-size="22">✦  Kendi deseninizi oluşturma</text>
  <text x="60" y="1565" class="body" font-size="22">✦  Bitmiş ürününüzü eve götürme</text>

  <!-- Capacity & Price -->
  <rect x="60" y="1610" width="460" height="70" rx="35" fill="#1E3C72"/>
  <text x="290" y="1655" text-anchor="middle" class="white" font-size="28" font-weight="700">₺1.500 / Kişi</text>

  <rect x="550" y="1610" width="470" height="70" rx="35" fill="#BA5536"/>
  <text x="785" y="1655" text-anchor="middle" class="white" font-size="28" font-weight="700">Kontenjan: 8 Kişi</text>

  <!-- CTA Button -->
  <rect x="60" y="1710" width="960" height="80" rx="40" fill="#1E3C72"/>
  <text x="540" y="1762" text-anchor="middle" class="white" font-size="32" font-weight="700">Kayıt için DM veya WhatsApp ✉️</text>

  <!-- Bottom bar with handle -->
  <rect x="0" y="1830" width="1080" height="90" fill="#FCF8F0"/>
  <line x1="60" y1="1835" x2="1020" y2="1835" stroke="#E6E6E6" stroke-width="1"/>
  <text x="540" y="1878" text-anchor="middle" class="body-light" font-size="20">@atelierthamga  ·  @zeynepsemiz_photography</text>

</svg>
