<?xml version="1.0" encoding="UTF-8"?>
<!-- Atelier Thamga - Workshop Instagram Post Template -->
<!-- Size: 1080x1350px (4:5 Portrait) -->
<!-- Open in Illustrator to edit -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&amp;display=swap');
      .title { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-weight:700; fill:#1E3C72; }
      .subtitle { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-weight:600; fill:#BA5536; }
      .body { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-weight:400; fill:#2C2C2C; }
      .body-light { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-weight:400; fill:#787878; }
      .white { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; fill:#FFFFFF; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="#FCF8F0"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="#1E3C72"/>

  <!-- Logo area (top left) - Replace with your logo -->
  <rect x="60" y="40" width="120" height="70" rx="6" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="1"/>
  <text x="120" y="72" text-anchor="middle" class="body-light" font-size="11">ATELIER</text>
  <text x="120" y="88" text-anchor="middle" class="body-light" font-size="11">THAMGA</text>
  <text x="120" y="102" text-anchor="middle" class="body-light" font-size="8">LOGO HERE</text>

  <!-- Workshop label -->
  <rect x="60" y="140" width="220" height="50" rx="25" fill="#BA5536"/>
  <text x="170" y="172" text-anchor="middle" class="white" font-size="20" font-weight="700">WORKSHOP</text>

  <!-- Decorative line -->
  <line x1="60" y1="210" x2="1020" y2="210" stroke="#E6E6E6" stroke-width="1"/>
  <line x1="60" y1="216" x2="140" y2="216" stroke="#BA5536" stroke-width="3"/>

  <!-- ====== WORKSHOP TITLE (EDIT THIS) ====== -->
  <text x="60" y="280" class="title" font-size="56">Blok Baskı</text>
  <text x="60" y="345" class="title" font-size="56">Atölyesi</text>

  <!-- Workshop subtitle/description -->
  <text x="60" y="410" class="body-light" font-size="22">Anadolu'nun kadim motiflerini</text>
  <text x="60" y="442" class="body-light" font-size="22">ahşap kalıplarla kumaşa aktarın</text>

  <!-- Decorative motif area - Replace with your block print image -->
  <rect x="60" y="500" width="960" height="420" rx="12" fill="#E8E0D4"/>
  <text x="540" y="690" text-anchor="middle" class="body-light" font-size="18">[ WORKSHOP GÖRSELİ / FOTOĞRAF BURAYA ]</text>
  <text x="540" y="720" text-anchor="middle" class="body-light" font-size="14">1080 × 420px · Replace this box with your image</text>
  
  <!-- Motif placeholder decoration -->
  <rect x="60" y="500" width="960" height="420" rx="12" fill="none" stroke="#BA5536" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Info cards -->
  <!-- Date -->
  <rect x="60" y="960" width="300" height="110" rx="12" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="1"/>
  <text x="80" y="995" font-size="32">📅</text>
  <text x="130" y="995" class="subtitle" font-size="18">TARİH</text>
  <text x="80" y="1035" class="title" font-size="24" font-weight="700">26 Nisan 2026</text>
  <text x="80" y="1060" class="body-light" font-size="16">Cumartesi</text>

  <!-- Time -->
  <rect x="390" y="960" width="300" height="110" rx="12" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="1"/>
  <text x="410" y="995" font-size="32">⏰</text>
  <text x="460" y="995" class="subtitle" font-size="18">SAAT</text>
  <text x="410" y="1035" class="title" font-size="24" font-weight="700">14:00 - 17:00</text>
  <text x="410" y="1060" class="body-light" font-size="16">3 saat</text>

  <!-- Location -->
  <rect x="720" y="960" width="300" height="110" rx="12" fill="#FFFFFF" stroke="#E6E6E6" stroke-width="1"/>
  <text x="740" y="995" font-size="32">📍</text>
  <text x="790" y="995" class="subtitle" font-size="18">YER</text>
  <text x="740" y="1035" class="title" font-size="24" font-weight="700">Atelier Thamga</text>
  <text x="740" y="1060" class="body-light" font-size="16">İstanbul</text>

  <!-- What you'll learn section -->
  <text x="60" y="1120" class="title" font-size="28" font-weight="700">Bu Atölyede:</text>
  <line x1="60" y1="1128" x2="130" y2="1128" stroke="#BA5536" stroke-width="2"/>

  <text x="60" y="1165" class="body" font-size="20">✦  Ahşap kalıp oyma temelleri</text>
  <text x="60" y="1198" class="body" font-size="20">✦  Doğal boya hazırlama ve uygulama</text>
  <text x="60" y="1231" class="body" font-size="20">✦  Selçuklu motiflerini kumaşa aktarma</text>
  <text x="540" y="1165" class="body" font-size="20">✦  Kendi deseninizi oluşturma</text>
  <text x="540" y="1198" class="body" font-size="20">✦  Bitmiş ürününüzü eve götürme</text>
  <text x="540" y="1231" class="body" font-size="20">✦  Çay &amp; atıştırmalık dahil</text>

  <!-- Price & CTA -->
  <rect x="60" y="1265" width="480" height="60" rx="30" fill="#1E3C72"/>
  <text x="300" y="1304" text-anchor="middle" class="white" font-size="24" font-weight="700">₺1.500 / Kişi</text>

  <rect x="570" y="1265" width="450" height="60" rx="30" fill="#BA5536"/>
  <text x="795" y="1304" text-anchor="middle" class="white" font-size="24" font-weight="700">Kayıt: DM / WhatsApp</text>

</svg>
