  <line x1="25" y1="430" x2="75" y2="430" stroke="#BA5536" stroke-width="1"/>

  <text x="35" y="448" class="pkg-detail" fill="#2C2C2C;">•  Profesyonel stüdyo çekimi</text>
  <text x="35" y="462" class="pkg-detail" fill="#2C2C2C;">•  Işık ve arka plan düzenlemesi</text>
