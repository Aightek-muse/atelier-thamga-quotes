  <rect x="25" y="150" width="545.28" height="75" rx="3" fill="#FCF8F0"/>
  <text x="35" y="168" class="pkg-name" fill="#1E3C72">Newborn (Yenidoğan)</text>
  <text x="35" y="182" class="pkg-detail" fill="#787878">Süre: 1 - 1.5 saat</text>
  <text x="35" y="196" class="pkg-detail" fill="#2C2C2C">•  0-14 günlük bebekler için</text>
  <text x="35" y="210" class="pkg-detail" fill="#2C2C2C">•  Swaddle, aksesuarlar dahil</text>
  <text x="35" y="224" class="pkg-detail" fill="#2C2C2C;">•  Aile portresi dahil</text>
  <text x="310" y="196" class="pkg-detail" fill="#2C2C2C;">•  25+ dijital fotoğraf (retouch)</text>
  <text x="310" y="210" class="pkg-detail" fill="#2C2C2C;">•  Online galeri erişimi</text>
  <text x="310" y="224" class="pkg-detail" fill="#2C2C2C;">•  7-14 iş günü teslimat</text>
  <text x="35" y="242" class="price">6.000 TL</text>

