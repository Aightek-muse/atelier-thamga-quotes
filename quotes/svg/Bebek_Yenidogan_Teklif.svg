  <line x1="35" y1="557" x2="540" y2="557" stroke="#E6E6E6" stroke-width="0.3"/>
  <text x="35" y="572" class="addon-name">Çerçeveli baskı (20x30 cm)</text><text x="540" y="572" class="addon-price">450 TL</text>
  <line x1="35" y1="577" x2="540" y2="577" stroke="#E6E6E6" stroke-width="0.3"/>
  <text x="35" y="592" class="addon-name">Fotoğraf albümü (20 sayfa)</text><text x="540" y="592" class="addon-price">800 - 1.500 TL</text>
  <line x1="35" y1="597" x2="540" y2="597" stroke="#E6E6E6" stroke-width="0.3"/>
  <text x="35" y="612" class="addon-name">Dış mekan çekim</text><text x="540" y="612" class="addon-price">+1.500 TL</text>
  <line x1="35" y1="617" x2="540" y2="617" stroke="#E6E6E6" stroke-width="0.3"/>
  <text x="35" y="632" class="addon-name">Makyaj &amp; saç</text><text x="540" y="632" class="addon-price">+800 TL</text>
  <line x1="35" y1="637" x2="540" y2="637" stroke="#E6E6E6" stroke-width="0.3"/>
  <text x="35" y="652" class="addon-name">Kıyafet kiralama</text><text x="540" y="652" class="addon-price">+300 TL</text>

  <!-- Terms -->
  <text x="25" y="685" class="section-title" font-size="13">Şartlar ve Koşullar</text>
  <line x1="25" y1="690" x2="65" y2="690" stroke="#BA5536" stroke-width="1"/>

  <text x="35" y="705" class="term">•  Rezervasyon için %30 depozito gerekmektedir.</text>
  <text x="35" y="716" class="term">•  Çekim tarihinden 48 saat önce ücretsiz iptal/erteleme yapılabilir.</text>
  <text x="35" y="727" class="term">•  Çekim sonrası 7-14 iş günü içinde online galeri teslim edilir.</text>
  <text x="35" y="738" class="term">•  Dijital fotoğraflar yüksek çözünürlükte, baskıya hazır formatta teslim edilir.</text>
  <text x="35" y="749" class="term">•  Ekstra retouch istekleri saatlik 250 TL ücretlendirilir.</text>
  <text x="35" y="760" class="term">•  Dış mekan çekimler için +1.500 TL lokasyon ücreti eklenir.</text>
  <text x="35" y="771" class="term">•  Tekrar planlama 1 kez ücretsizdir.</text>

