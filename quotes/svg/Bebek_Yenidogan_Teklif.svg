  <text x="35" y="380" class="pkg-detail" fill="#C8D7F0;">•  Pasta ve dekorasyon dahil</text>
  <text x="35" y="394" class="pkg-detail" fill="#C8D7F0;">•  Aile portresi dahil</text>
  <text x="310" y="366" class="pkg-detail" fill="#C8D7F0;">•  15 dijital fotoğraf (retouch)</text>
  <text x="310" y="380" class="pkg-detail" fill="#C8D7F0;">•  Online galeri erişimi</text>
  <text x="310" y="394" class="pkg-detail" fill="#C8D7F0;">•  7-14 iş günü teslimat</text>
  <text x="35" y="412" class="price">4.500 TL</text>

