  <text x="35" y="267" class="pkg-detail" fill="#787878">Süre: 45 dakika</text>
  <text x="35" y="281" class="pkg-detail" fill="#2C2C2C;">•  3-12 aylık bebekler için</text>
  <text x="35" y="295" class="pkg-detail" fill="#2C2C2C;">•  Milestone çekimi</text>
  <text x="35" y="309" class="pkg-detail" fill="#2C2C2C;">•  2 farklı arka plan</text>
  <text x="310" y="281" class="pkg-detail" fill="#2C2C2C;">•  15 dijital fotoğraf (retouch)</text>
  <text x="310" y="295" class="pkg-detail" fill="#2C2C2C;">•  Online galeri erişimi</text>
  <text x="310" y="309" class="pkg-detail" fill="#2C2C2C;">•  7-14 iş günü teslimat</text>
  <text x="35" y="327" class="price">4.000 TL</text>

